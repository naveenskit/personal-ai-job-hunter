<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dashboard — Personal AI Job Hunter</title>
    <style>
      body { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Arial; padding: 2rem; }
      .card { border: 1px solid #e5e7eb; padding: 1rem; border-radius: 8px; margin-bottom: 1rem; }
      h1 { margin-bottom: 0.5rem; }
    </style>
  </head>
  <body>
    <h1>Dashboard (alpha)</h1>
    <div class="card">
      <strong>Service status:</strong> <span id="status">loading...</span>
    </div>
    <div class="card">
      <strong>Counts</strong>
      <ul>
        <li>Resumes: <span id="resumes">-</span></li>
        <li>Companies: <span id="companies">-</span></li>
        <li>Opportunities: <span id="opps">-</span></li>
        <li>Applications: <span id="applications">-</span></li>
        <li>Weekly Reports: <span id="weekly_reports">-</span></li>
        <li>Job Runs: <span id="job_runs">-</span></li>
      </ul>
    </div>
    <div class="card">
      <strong>Quick actions</strong>
      <ul>
        <li><a href="/api/v1/health">Health</a></li>
        <li><a href="/metrics">Metrics</a></li>
      </ul>
    </div>

    <script>
      async function loadStatus() {
        try {
          const r = await fetch('/api/v1/health');
          const j = await r.json();
          document.getElementById('status').textContent = j.data.status + ' (' + j.data.environment + ')';
        } catch (e) {
          document.getElementById('status').textContent = 'unavailable';
        }

        async function loadCounts() {
          try {
            const r = await fetch('/dashboard/api/stats');
            const j = await r.json();
            document.getElementById('resumes').textContent = j.resumes;
            document.getElementById('companies').textContent = j.companies;
            document.getElementById('opps').textContent = j.opportunities;
            document.getElementById('applications').textContent = j.applications;
            document.getElementById('weekly_reports').textContent = j.weekly_reports;
            document.getElementById('job_runs').textContent = j.job_runs;
          } catch (e) {
            // leave dash values
          }
        }

        loadStatus();
        loadCounts();
    </script>
  </body>
</html>
