version: '3.8'
services:
  web:
    build: .
    command: gunicorn -c gunicorn.conf.py wsgi:app
    restart: always
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - APP_SECRET_KEY=${APP_SECRET_KEY}
    expose:
      - 8000
    volumes:
      - .:/app:ro

  nginx:
    image: nginx:stable
    depends_on:
      - web
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./app/dashboard/static:/app/app/dashboard/static:ro
version: '3.8'

services:
  web:
    image: ghcr.io/${GITHUB_OWNER}/${GITHUB_REPO}:latest
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=${DATABASE_URL}
    ports:
      - "8000:8000"
    restart: unless-stopped

  # Example Postgres service for local prod-like testing
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: jobhunter
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: jobhunter
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
