version: '3.8'

services:
  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=sqlite+aiosqlite:///./data/jobhunter.db
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
version: "3.8"

services:
  web:
    build: .
    image: personal-ai-job-hunter:latest
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    command: gunicorn --bind 0.0.0.0:8000 wsgi:app
